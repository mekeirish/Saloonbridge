<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cafétéria iCafe — Édition Apple</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { background-color: #000000; font-family: system-ui, -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif; letter-spacing: -0.01em; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #1c1c1e; border-radius: 20px; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 20px; }
        .edit-mode { outline: 2px solid #007aff; outline-offset: -1px; border-radius: 32px; }
        .editable { position: relative; cursor: pointer; transition: all 0.2s ease; }
        .editable::after {
            content: "✎"; position: absolute; top: 6px; right: 8px; font-size: 10px;
            background: rgba(255,255,255,0.2); backdrop-filter: blur(8px); color: #ffffff;
            border-radius: 20px; padding: 2px 6px; font-weight: 500; pointer-events: none;
            z-index: 20; border: 0.5px solid rgba(255,255,255,0.2);
        }
        .cat-btn, .prod-btn {
            transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
            backdrop-filter: blur(12px);
            border: 0.5px solid rgba(255,255,255,0.08);
        }
        .cat-btn:active, .prod-btn:active { transform: scale(0.97); background-color: rgba(255,255,255,0.12); }
        .floating-btn {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(30,30,35,0.8); backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255,255,255,0.2); border-radius: 40px;
            padding: 10px 24px; font-size: 14px; font-weight: 500; color: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3); transition: 0.2s; white-space: nowrap;
        }
        .floating-btn:hover { background: #007aff; color: white; border-color: transparent; }
        .saloon-logo-bg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 280px; height: auto; opacity: 0.04; pointer-events: none; z-index: 0;
            filter: blur(0.5px);
        }
        .relative-bg { position: relative; }
        .relative-bg > *:not(.saloon-logo-bg) { position: relative; z-index: 2; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .modal-anim { animation: fadeInUp 0.25s ease-out; }
        input, textarea { font-size: 16px; }
        input:focus, textarea:focus, button:focus { outline: none; }
    </style>

<body class="bg-black text-white antialiased overflow-hidden">
    <div id="root" style="height: 100dvh;"></div>
    <script>
        (function() {
            window.onerror = function(msg, url, line, col, error) {
                console.error("ERREUR:", msg, "à la ligne", line);
                return false;
            };
            console.log("Démarrage — édition Apple premium");

            const { useState, useEffect, useCallback, useMemo, useRef, memo } = React;

            // ==================== DONNÉES STATIQUES (inchangées) ====================
            const BASE_MENU = {
                coffee: { label: 'Café', color: '#ea580c', items: [{n: 'Espresso', p: 150}, {n: 'قهوة', p: 200}, {n: 'Cappuccino', p: 350}, {n: 'Latte', p: 380}] },
                tea: { label: 'Thé', color: '#7c3aed', items: [{n: 'Earl Grey', p: 250}, {n: 'Vert Sencha', p: 250}, {n: 'Menthe', p: 220}, {n: 'Chai', p: 300}] },
                snack: { label: 'Snack', color: '#eab308', items: [{n: 'Croissant', p: 180}, {n: 'Pain Choco', p: 180}, {n: 'Cookie', p: 200}, {n: 'Muffin', p: 250}] },
                cold: { label: 'Frais', color: '#16a34a', items: [{n: 'Jus Orange', p: 350}, {n: 'Eau Miné', p: 150}, {n: 'Ice Tea', p: 300}, {n: 'Soda', p: 250}] },
                bakery: { label: 'Pain', color: '#db2777', items: [{n: 'Baguette', p: 120}, {n: 'Tradition', p: 140}, {n: 'Pain complet', p: 200}] }
            };

            const generateUUID = () => crypto.randomUUID ? crypto.randomUUID() : Date.now() + '-' + Math.random();
            const getTodayString = () => new Date().toDateString();
            const extractFlaticonImageUrl = (url) => { try { const m = url.match(/(\d{6,7})/); if (m) return `https://cdn-icons-png.flaticon.com/512/${Math.floor(m[1]/1000)}/${m[1]}.png`; return null; } catch(e){return null;} };
            const validatePrice = (v) => Math.max(0, parseFloat(v) || 0);
            const getProductKey = (item, idx) => `${item.n}-${idx}`;
            const resizeImageToMax = (file, maxSize) => new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if (w > h) { if (w > maxSize) { h = (h * maxSize) / w; w = maxSize; } }
                        else { if (h > maxSize) { w = (w * maxSize) / h; h = maxSize; } }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.clearRect(0,0,w,h);
                        ctx.drawImage(img,0,0,w,h);
                        resolve(canvas.toDataURL('image/png',1));
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });

            // ==================== COMPOSANTS STYLISÉS ====================
            const CategoryButton = memo(({ menuKey, cat, isActive, onPressStart, onPressEnd, onClick, isEditingMode }) => {
                const imageUrl = cat.imageUrl;
                const activeClass = isActive ? "bg-white/10 border-white/30 shadow-md" : "bg-white/5 border-white/10 hover:bg-white/10";
                let className = `cat-btn rounded-2xl font-medium text-sm transition-all duration-200 ${activeClass} backdrop-blur-md`;
                if (!imageUrl) className += isActive ? " text-white" : " text-gray-300";
                if (isEditingMode) className += " editable";
                return React.createElement('button', {
                    onClick: () => onClick(menuKey),
                    onTouchStart: (e) => onPressStart('category', menuKey)(e),
                    onTouchEnd: onPressEnd,
                    onMouseDown: (e) => onPressStart('category', menuKey)(e),
                    onMouseUp: onPressEnd,
                    className,
                },
                    imageUrl ? React.createElement('img', { src: imageUrl, alt: cat.label, className: "w-10 h-10 object-contain mb-1" }) : null,
                    React.createElement('span', { className: "tracking-tight text-[13px] font-medium" }, cat.label)
                );
            });

            const ProductButton = memo(({ item, idx, catKey, onPressStart, onPressEnd, onClick, isEditingMode }) => {
                const imageUrl = item.imageUrl;
                let className = `prod-btn rounded-2xl transition-all duration-200 text-center bg-white/5 border border-white/10 backdrop-blur-md hover:bg-white/10 active:bg-white/15`;
                if (!imageUrl) className += " text-gray-200";
                if (isEditingMode) className += " editable";
                return React.createElement('button', {
                    key: getProductKey(item, idx),
                    onClick: () => onClick(item),
                    onTouchStart: (e) => onPressStart('product', catKey, idx)(e),
                    onTouchEnd: onPressEnd,
                    onMouseDown: (e) => onPressStart('product', catKey, idx)(e),
                    onMouseUp: onPressEnd,
                    className
                },
                    imageUrl ? React.createElement('img', { src: imageUrl, alt: item.n, className: "w-12 h-12 object-contain mb-1" }) : null,
                    React.createElement('div', { className: "text-container" },
                        React.createElement('span', { className: "font-semibold text-[11px] tracking-tight" }, item.n),
                        React.createElement('span', { className: "text-[9px] text-[#ff9f0a] font-medium block mt-0.5" }, item.p, " DZD")
                    )
                );
            });

            const PieChart = ({ data }) => {
                if (!data.length) return React.createElement('p', { className: "text-center text-gray-400 text-sm" }, "Aucune donnée");
                const total = data.reduce((s,i)=>s+i.quantity,0);
                let currentAngle = 0;
                const segments = [];
                const colors = ['#007aff', '#ff9f0a', '#34c759', '#ff3b30', '#af52de', '#ff9500', '#5e5ce6', '#64d2ff'];
                data.forEach((item,i) => {
                    const angle = (item.quantity/total)*360;
                    if (angle===0) return;
                    const start = currentAngle;
                    const end = currentAngle+angle;
                    const x1 = 90+80*Math.cos(start*Math.PI/180);
                    const y1 = 90+80*Math.sin(start*Math.PI/180);
                    const x2 = 90+80*Math.cos(end*Math.PI/180);
                    const y2 = 90+80*Math.sin(end*Math.PI/180);
                    const large = angle>180?1:0;
                    segments.push(React.createElement('path', { key:i, d:`M 90 90 L ${x1} ${y1} A 80 80 0 ${large} 1 ${x2} ${y2} Z`, fill:colors[i%colors.length], stroke:'#1c1c1e', strokeWidth:2 }));
                    currentAngle = end;
                });
                return React.createElement('div', { className: "flex flex-col items-center gap-3" },
                    React.createElement('svg', { viewBox:"0 0 180 180", className:"w-44 h-44" },
                        React.createElement('circle', { cx:90, cy:90, r:85, fill:"#1c1c1e", stroke:"#007aff", strokeWidth:1.5 }),
                        segments,
                        React.createElement('circle', { cx:90, cy:90, r:35, fill:"#000000", stroke:"#007aff80", strokeWidth:1 })
                    ),
                    React.createElement('div', { className:"flex flex-wrap gap-2 justify-center" }, data.map((item,i)=>React.createElement('div', { key:i, className:"flex items-center gap-1 text-[11px]" }, React.createElement('div', { className:"w-3 h-3 rounded-full", style:{backgroundColor:colors[i%colors.length]} }), React.createElement('span', null, item.name, " (", item.quantity, ")" ))))
                );
            };

            // ==================== COMPOSANT PRINCIPAL ====================
            const CafeteriaApp = () => {
                console.log("CafeteriaApp — version premium active");
                const [transactions, setTransactions] = useState([]);
                const [cart, setCart] = useState([]);
                const [recipes, setRecipes] = useState([]);
                const [activeCategory, setActiveCategory] = useState('coffee');
                const [isEditingMode, setIsEditingMode] = useState(false);
                const [isTablet, setIsTablet] = useState(window.innerWidth >= 768);
                const [activeTab, setActiveTab] = useState('sell');
                const [customMenu, setCustomMenu] = useState(() => {
                    try { const saved = localStorage.getItem("cafeteria_custom_menu"); return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(BASE_MENU)); } catch(e){ return JSON.parse(JSON.stringify(BASE_MENU)); }
                });
                const [saloonLogo, setSaloonLogo] = useState(() => { try { return localStorage.getItem("cafeteria_saloon_logo") || ''; } catch(e){ return ''; } });
                const [stocks, setStocks] = useState(() => {
                    try { const saved = localStorage.getItem("cafeteria_stocks"); if(saved) return JSON.parse(saved); } catch(e){}
                    const init = {}; Object.keys(BASE_MENU).forEach(ck=>{ BASE_MENU[ck].items.forEach(it=>{ init[it.n]=0; }); }); return init;
                });
                const [stockModal, setStockModal] = useState({ open: false, product: null, currentQty:0, inputValue:'' });
                const [soundEnabled, setSoundEnabled] = useState(() => { try{ return localStorage.getItem("cafeteria_sound_enabled") !== 'false'; }catch(e){ return true; } });
                const [isModalOpen, setIsModalOpen] = useState(false);
                const [showHistory, setShowHistory] = useState(false);
                const [showSyncPanel, setShowSyncPanel] = useState(false);
                const [showImagePanel, setShowImagePanel] = useState(false);
                const [selectedRecipeDetail, setSelectedRecipeDetail] = useState(null);
                const [showAdvancedEdit, setShowAdvancedEdit] = useState(false);
                const [showAddCategory, setShowAddCategory] = useState(false);
                const [showAddProduct, setShowAddProduct] = useState(false);
                const [showManageItems, setShowManageItems] = useState(false);
                const [confirmModal, setConfirmModal] = useState({ open: false, message: '', onConfirm: null, onCancel: null });
                const [expandedCat, setExpandedCat] = useState(null);
                const [newCategoryName, setNewCategoryName] = useState('');
                const [newCategoryImageUrl, setNewCategoryImageUrl] = useState('');
                const [newCategoryImageImport, setNewCategoryImageImport] = useState('');
                const [newCategoryUploading, setNewCategoryUploading] = useState(false);
                const [newProductCategory, setNewProductCategory] = useState('');
                const [newProductName, setNewProductName] = useState('');
                const [newProductPrice, setNewProductPrice] = useState('');
                const [newProductStock, setNewProductStock] = useState('');
                const [newProductImageUrl, setNewProductImageUrl] = useState('');
                const [newProductImageImport, setNewProductImageImport] = useState('');
                const [newProductUploading, setNewProductUploading] = useState(false);
                const audioCtx = useRef(null);
                const cashSoundRef = useRef(null);
                const [imgbbApiKey, setImgbbApiKey] = useState('');
                const [imgbbApiKeySaved, setImgbbApiKeySaved] = useState('');
                const [uploadedImageUrl, setUploadedImageUrl] = useState('');
                const [isUploading, setIsUploading] = useState(false);
                const [uploadMessage, setUploadMessage] = useState('');
                const fileInputRef = useRef(null);
                const [importJsonText, setImportJsonText] = useState("");
                const [exportJsonText, setExportJsonText] = useState("");
                const [editModal, setEditModal] = useState({ open: false, type: null, categoryKey: null, itemIndex: null });
                const [tempEditName, setTempEditName] = useState('');
                const [tempEditPrice, setTempEditPrice] = useState('');
                const [tempEditImageUrl, setTempEditImageUrl] = useState('');
                const [tempEditUrlImport, setTempEditUrlImport] = useState('');
                const [editUploading, setEditUploading] = useState(false);
                const [urlImportLoading, setUrlImportLoading] = useState(false);
                const pressTimer = useRef(null);
                const optionsPressTimer = useRef(null);
                
                // Sauvegardes
                useEffect(() => { localStorage.setItem("cafeteria_custom_menu", JSON.stringify(customMenu)); }, [customMenu]);
                useEffect(() => { localStorage.setItem("cafeteria_stocks", JSON.stringify(stocks)); }, [stocks]);
                useEffect(() => { localStorage.setItem("cafeteria_sound_enabled", soundEnabled); }, [soundEnabled]);
                useEffect(() => { localStorage.setItem("cafeteria_saloon_logo", saloonLogo); }, [saloonLogo]);
                useEffect(() => {
                    try {
                        const savedTx = localStorage.getItem("cafeteria_transactions");
                        if (savedTx) setTransactions(JSON.parse(savedTx));
                        const savedRec = localStorage.getItem("cafeteria_recipes");
                        if (savedRec) setRecipes(JSON.parse(savedRec));
                        const savedKey = localStorage.getItem("imgbb_api_key");
                        if (savedKey) { setImgbbApiKeySaved(savedKey); setImgbbApiKey(savedKey); }
                    } catch(e) {}
                }, []);
                useEffect(() => { localStorage.setItem("cafeteria_transactions", JSON.stringify(transactions)); }, [transactions]);
                useEffect(() => { localStorage.setItem("cafeteria_recipes", JSON.stringify(recipes)); }, [recipes]);
                useEffect(() => { localStorage.setItem("imgbb_api_key", imgbbApiKeySaved); }, [imgbbApiKeySaved]);
                useEffect(() => {
                    const handleResize = () => setIsTablet(window.innerWidth >= 768);
                    window.addEventListener("resize", handleResize);
                    return () => window.removeEventListener("resize", handleResize);
                }, []);
                
                // Audio
                useEffect(() => {
                    audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
                    cashSoundRef.current = new Audio("https://orangefreesounds.com/wp-content/uploads/2026/01/Cash-register-cha-ching-sound-effect.mp3");
                    cashSoundRef.current.preload = "auto";
                    cashSoundRef.current.volume = 0.5;
                    return () => {
                        if (audioCtx.current) audioCtx.current.close();
                        if (cashSoundRef.current) cashSoundRef.current.pause();
                    };
                }, []);
                const playClickSound = () => {
                    if (!soundEnabled || !audioCtx.current) return;
                    const osc = audioCtx.current.createOscillator();
                    const gain = audioCtx.current.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.current.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600, audioCtx.current.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(400, audioCtx.current.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.1, audioCtx.current.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.current.currentTime + 0.1);
                    osc.start();
                    osc.stop(audioCtx.current.currentTime + 0.1);
                };
                const playCashSound = () => {
                    if (!soundEnabled || !cashSoundRef.current) return;
                    cashSoundRef.current.currentTime = 0;
                    cashSoundRef.current.play().catch(e=>console.log("Audio bloqué", e));
                };
                
                // Fonctions métier (inchangées)
                const handleAddToCart = (item) => { playClickSound(); setCart(prev=>[...prev, item]); };
                const handleUndoLastRecipe = () => {
                    if (!recipes.length) return;
                    playClickSound();
                    const last = recipes[recipes.length-1];
                    setRecipes(prev=>prev.slice(0,-1));
                    setCart(prev=>[...prev, ...last.items]);
                    const refundTx = { uuid:generateUUID(), timestamp:Date.now(), item:{ n:`ANNULATION - ${last.items.map(i=>i.n).join(', ')}`, p:-last.total }, isRefund:true, originalRecipeId:last.uuid };
                    setTransactions(prev=>[...prev, refundTx]);
                    setTransactions(prev=>prev.filter(t=>t.timestamp!==last.timestamp));
                };
                const handleClearCart = () => { if(cart.length){ playClickSound(); setCart([]); } };
                const handleCash = () => {
                    if(!cart.length) return;
                    playCashSound();
                    const recipe = { uuid:generateUUID(), timestamp:Date.now(), items:[...cart], total:cart.reduce((s,i)=>s+i.p,0) };
                    setRecipes(prev=>[...prev, recipe]);
                    const newTx = cart.map(item=>({ uuid:generateUUID(), timestamp:recipe.timestamp, item, isRefund:false }));
                    setTransactions(prev=>[...prev, ...newTx]);
                    setStocks(prev=>{
                        const newStocks = {...prev};
                        cart.forEach(item=>{ const name = item.n; newStocks[name] = (newStocks[name]||0) - 1; });
                        return newStocks;
                    });
                    setCart([]);
                };
                const cartTotal = useMemo(()=>cart.reduce((s,i)=>s+i.p,0), [cart]);
                const hasRecipes = recipes.length>0;
                const getTodayRecipes = () => {
                    const today = getTodayString();
                    return recipes.filter(r=>new Date(r.timestamp).toDateString()===today);
                };
                
                // Upload / images (inchangé)
                const resizeImage = (file) => resizeImageToMax(file,120);
                const uploadToImgBB = async (base64) => {
                    if(!imgbbApiKeySaved) throw new Error("Clé API manquante");
                    const fd = new FormData(); fd.append("key", imgbbApiKeySaved); fd.append("image", base64.split(',')[1]);
                    const res = await fetch("https://api.imgbb.com/1/upload", { method:"POST", body:fd });
                    if(!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    if(data.success) return data.data.url;
                    throw new Error(data.error?.message || "Erreur ImgBB");
                };
                const uploadFile = async (file) => {
                    if(!imgbbApiKeySaved){ setUploadMessage("❌ Clé API manquante"); return null; }
                    setIsUploading(true);
                    try{
                        const resized = await resizeImage(file);
                        const url = await uploadToImgBB(resized);
                        setUploadMessage("✅ Upload réussi !");
                        return url;
                    }catch(err){ setUploadMessage("❌ Erreur: "+err.message); return null; }
                    finally{ setIsUploading(false); }
                };
                const importFromUrl = async (url) => {
                    if(!url.trim()) return null;
                    if(!imgbbApiKeySaved){ setUploadMessage("❌ Clé API manquante"); return null; }
                    let imageUrl = url;
                    if(url.includes('flaticon.com')){
                        const cdn = extractFlaticonImageUrl(url);
                        if(cdn) imageUrl = cdn;
                        else { setUploadMessage("❌ Lien Flaticon invalide"); return null; }
                    }
                    setIsUploading(true);
                    try{
                        const resp = await fetch(imageUrl, { mode:'cors' });
                        if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
                        const blob = await resp.blob();
                        const file = new File([blob], "image_from_url", { type:blob.type || 'image/png' });
                        const resized = await resizeImage(file);
                        const uploaded = await uploadToImgBB(resized);
                        setUploadMessage("✅ Import réussi !");
                        return uploaded;
                    }catch(err){ setUploadMessage("❌ Erreur: "+err.message); return null; }
                    finally{ setIsUploading(false); }
                };
                
                const exportFullConfig = useCallback(() => {
                    const config = { customMenu, stocks, version:"1.0", exportDate:new Date().toISOString() };
                    const str = JSON.stringify(config, null, 2);
                    setExportJsonText(str);
                    playClickSound();
                    setConfirmModal({ open:true, message:"Configuration copiée", onConfirm:()=>{}, onCancel:()=>setConfirmModal({ open:false, message:'', onConfirm:null, onCancel:null }) });
                }, [customMenu, stocks]);
                const importFullConfig = useCallback(() => {
                    if(!importJsonText.trim()) return;
                    try{
                        const imported = JSON.parse(importJsonText);
                        if(imported.customMenu && imported.stocks){
                            setCustomMenu(imported.customMenu);
                            setStocks(imported.stocks);
                            setImportJsonText("");
                            playClickSound();
                            setConfirmModal({ open:true, message:"Import réussi", onConfirm:()=>{}, onCancel:()=>setConfirmModal({ open:false, message:'', onConfirm:null, onCancel:null }) });
                        } else throw new Error("Format invalide");
                    }catch(e){ setConfirmModal({ open:true, message:"Erreur: "+e.message, onConfirm:()=>{}, onCancel:()=>setConfirmModal({ open:false, message:'', onConfirm:null, onCancel:null }) }); }
                }, [importJsonText]);
                
                const openEditModal = (type, catKey, idx=null) => {
                    if(type==='category'){
                        const cat = customMenu[catKey];
                        setTempEditName(cat.label);
                        setTempEditImageUrl(cat.imageUrl || '');
                        setTempEditPrice(0);
                    }else{
                        const item = customMenu[catKey].items[idx];
                        setTempEditName(item.n);
                        setTempEditPrice(item.p);
                        setTempEditImageUrl(item.imageUrl || '');
                    }
                    setEditModal({ open:true, type, categoryKey:catKey, itemIndex:idx });
                    setTempEditUrlImport('');
                };
                const closeEditModal = () => setEditModal({ open:false, type:null, categoryKey:null, itemIndex:null });
                const saveEdit = () => {
                    setCustomMenu(prev=>{
                        const newMenu = JSON.parse(JSON.stringify(prev));
                        if(editModal.type==='category'){
                            newMenu[editModal.categoryKey].label = tempEditName;
                            if(tempEditImageUrl) newMenu[editModal.categoryKey].imageUrl = tempEditImageUrl;
                            else delete newMenu[editModal.categoryKey].imageUrl;
                        }else{
                            const item = newMenu[editModal.categoryKey].items[editModal.itemIndex];
                            item.n = tempEditName;
                            item.p = validatePrice(tempEditPrice);
                            if(tempEditImageUrl) item.imageUrl = tempEditImageUrl;
                            else delete item.imageUrl;
                        }
                        return newMenu;
                    });
                    closeEditModal();
                };
                const handleImportUrl = async () => {
                    if(!tempEditUrlImport) return;
                    setUrlImportLoading(true);
                    const url = await importFromUrl(tempEditUrlImport);
                    if(url) setTempEditImageUrl(url);
                    setUrlImportLoading(false);
                };

<script>// ============================================================
// RECORDCODE BRIDGE – Contrôle total (v2)
// Améliorations :
//  - Ajout d’un attribut data-recordcode-id sur les éléments interactifs
//  - Sélecteurs plus courts et stables (priorité à data-recordcode-id)
//  - Gestion des événements en phase de capture pour une meilleure fiabilité
//  - Détection des changements DOM pour ajouter les identifiants aux nouveaux éléments
// ============================================================
(function() {
  'use strict';

  // --- Configuration ---
  const DEBUG = true;
  const ATTR_NAME = 'data-recordcode-id';

  // --- Logging ---
  function log(...args) {
    if (DEBUG) console.log('[Recordcode]', ...args);
  }

  // --- Vérification de l'environnement ---
  if (window === window.top) {
    console.warn('[Recordcode] Page non intégrée dans une iframe – le bridge est actif mais ne pourra pas communiquer avec un parent.');
  }

  // ========== GESTION DES IDENTIFIANTS UNIQUES ==========
  // Compteur global pour générer des ID uniques
  let idCounter = 0;

  // Fonction pour attribuer un identifiant unique à un élément
  function ensureRecordId(el) {
    if (!el) return;
    if (el.hasAttribute(ATTR_NAME)) return;
    const id = `rc_${++idCounter}`;
    el.setAttribute(ATTR_NAME, id);
    return id;
  }

  // Parcourir le DOM existant pour ajouter des identifiants aux éléments interactifs
  function addIdsToExistingElements() {
    const interactives = document.querySelectorAll('button, a, input, textarea, select, [role="button"], [tabindex]');
    interactives.forEach(el => ensureRecordId(el));
    log(`✅ Identifiants ajoutés à ${interactives.length} éléments interactifs.`);
  }

  // Observer les changements du DOM pour ajouter des identifiants aux nouveaux éléments
  const observer = new MutationObserver((mutations) => {
    for (const mutation of mutations) {
      for (const node of mutation.addedNodes) {
        if (node.nodeType === 1) { // Element
          // Vérifier l'élément lui-même
          if (node.matches && node.matches('button, a, input, textarea, select, [role="button"], [tabindex]')) {
            ensureRecordId(node);
          }
          // Vérifier les descendants
          const descendants = node.querySelectorAll ? node.querySelectorAll('button, a, input, textarea, select, [role="button"], [tabindex]') : [];
          descendants.forEach(el => ensureRecordId(el));
        }
      }
    }
  });
  observer.observe(document.body, { childList: true, subtree: true });

  // --- Exécuter au chargement ---
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => {
      addIdsToExistingElements();
    });
  } else {
    addIdsToExistingElements();
  }

  // ========== ENVOI DE MESSAGES AU PARENT ==========
  function sendToParent(payload) {
    if (window.parent && window.parent !== window) {
      try {
        window.parent.postMessage(payload, '*');
        log('📤 Envoyé au parent :', payload);
      } catch (e) {
        console.warn('[Recordcode] ⚠️ Erreur postMessage :', e);
      }
    } else {
      log('ℹ️ Pas de parent – message non envoyé :', payload);
    }
  }

  function sendAction(action, selector, value = null, extra = {}) {
    const payload = { type: 'ACTION', action, selector, value, ...extra };
    sendToParent(payload);
  }

  // ========== GÉNÉRATEUR DE SÉLECTEUR CSS ==========
  function getSelector(el) {
    if (!el) return null;
    // 1) Priorité : attribut data-recordcode-id
    if (el.hasAttribute(ATTR_NAME)) {
      return `[${ATTR_NAME}="${el.getAttribute(ATTR_NAME)}"]`;
    }
    // 2) id
    if (el.id) return '#' + el.id;
    // 3) name
    if (el.name) return `[name="${el.name}"]`;
    // 4) Chemin simplifié (max 4 niveaux)
    let path = [];
    let current = el;
    let depth = 0;
    while (current && current.tagName !== 'BODY' && depth < 4) {
      let sel = current.tagName.toLowerCase();
      if (current.id) {
        sel += '#' + current.id;
        path.unshift(sel);
        break;
      }
      if (current.className) {
        const classes = current.className.split(' ').filter(c => c && c !== 'active' && c !== 'hover').join('.');
        if (classes) sel += '.' + classes;
      }
      // Ajouter un index si nécessaire (parmi les frères de même tag)
      const siblings = current.parentNode ? Array.from(current.parentNode.children).filter(c => c.tagName === current.tagName) : [];
      if (siblings.length > 1) {
        const idx = siblings.indexOf(current) + 1;
        sel += `:nth-child(${idx})`;
      }
      path.unshift(sel);
      current = current.parentNode;
      depth++;
    }
    return path.join(' > ');
  }

  // ========== ÉCOUTEURS D'ÉVÉNEMENTS (en phase de capture) ==========

  // Clics
  document.addEventListener('click', (e) => {
    const target = e.target;
    if (target.closest('input, textarea, select')) return;
    ensureRecordId(target);
    sendAction('click', getSelector(target), null, { x: e.clientX, y: e.clientY });
  }, true);

  // Saisie
  document.addEventListener('input', (e) => {
    const target = e.target;
    if (target.matches('input, textarea, select')) {
      ensureRecordId(target);
      sendAction('input', getSelector(target), target.value);
    }
  }, true);

  // Changement (select, checkbox, radio)
  document.addEventListener('change', (e) => {
    const target = e.target;
    if (target.matches('select, input[type="checkbox"], input[type="radio"]')) {
      ensureRecordId(target);
      sendAction('change', getSelector(target), target.value);
    }
  }, true);

  // Focus / Blur
  document.addEventListener('focusin', (e) => {
    const target = e.target;
    if (target.matches('input, textarea, select, button, a')) {
      ensureRecordId(target);
      sendAction('focus', getSelector(target));
    }
  }, true);
  document.addEventListener('focusout', (e) => {
    const target = e.target;
    if (target.matches('input, textarea, select, button, a')) {
      ensureRecordId(target);
      sendAction('blur', getSelector(target));
    }
  }, true);

  // Scroll (global ou élément)
  document.addEventListener('scroll', (e) => {
    const target = e.target;
    if (target === document || target === window) {
      sendAction('scroll', 'window', null, { scrollX: window.scrollX, scrollY: window.scrollY });
    } else if (target.nodeType === 1) {
      ensureRecordId(target);
      sendAction('scroll', getSelector(target), null, { scrollLeft: target.scrollLeft, scrollTop: target.scrollTop });
    }
  }, { passive: true, capture: true });

  // Soumission de formulaire
  document.addEventListener('submit', (e) => {
    const form = e.target;
    if (form.tagName === 'FORM') {
      ensureRecordId(form);
      sendAction('submit', getSelector(form));
    }
  }, true);

  // Touches spéciales
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === 'Escape' || e.key === 'Tab' || e.ctrlKey || e.metaKey) {
      const target = e.target;
      ensureRecordId(target);
      sendAction('keydown', getSelector(target), e.key, { key: e.key, ctrlKey: e.ctrlKey, shiftKey: e.shiftKey, altKey: e.altKey, metaKey: e.metaKey });
    }
  }, true);
  document.addEventListener('keyup', (e) => {
    if (e.key === 'Enter' || e.key === 'Escape' || e.key === 'Tab' || e.ctrlKey || e.metaKey) {
      const target = e.target;
      ensureRecordId(target);
      sendAction('keyup', getSelector(target), e.key, { key: e.key, ctrlKey: e.ctrlKey, shiftKey: e.shiftKey, altKey: e.altKey, metaKey: e.metaKey });
    }
  }, true);

  // Clic droit
  document.addEventListener('contextmenu', (e) => {
    const target = e.target;
    ensureRecordId(target);
    sendAction('contextmenu', getSelector(target), null, { x: e.clientX, y: e.clientY });
  }, true);

  // Drag & Drop
  document.addEventListener('dragstart', (e) => {
    const target = e.target;
    ensureRecordId(target);
    sendAction('dragstart', getSelector(target));
  }, true);
  document.addEventListener('drop', (e) => {
    const target = e.target;
    ensureRecordId(target);
    sendAction('drop', getSelector(target));
  }, true);

  // ========== RÉCEPTION DES MESSAGES DU PARENT (relecture) ==========

  window.addEventListener('message', (e) => {
    if (window.parent && e.source !== window.parent) return;
    const data = e.data;
    if (!data) return;

    log('📥 Reçu du parent :', data);

    // 1) SIMULATE_CLICK
    if (data.type === 'SIMULATE_CLICK') {
      const { x, y } = data;
      const el = document.elementFromPoint(x, y);
      if (el) {
        el.dispatchEvent(new MouseEvent('click', {
          clientX: x,
          clientY: y,
          bubbles: true,
          cancelable: true
        }));
        log('🖱️ Clic simulé sur', el.tagName, 'à', x, y);
      } else {
        console.warn('[Recordcode] ⚠️ Aucun élément trouvé à', x, y);
      }
      return;
    }

    // 2) ACTION
    if (data.type === 'ACTION') {
      const { action, selector, value, extra = {} } = data;
      log('▶️ Relecture action :', action, selector);

      let target = null;
      if (selector === 'window') {
        target = window;
      } else if (selector) {
        target = document.querySelector(selector);
        // Si non trouvé, essayer de récupérer via data-recordcode-id (si le sélecteur est basé sur autre chose)
        if (!target && selector.includes('[' + ATTR_NAME + ']')) {
          // Déjà un sélecteur d'attribut, on ne fait rien de plus
        }
      }

      if (!target && !['scroll', 'submit', 'keydown', 'keyup'].includes(action)) {
        console.warn('[Recordcode] ❌ Cible introuvable pour', selector);
        return;
      }

      try {
        switch (action) {
          case 'click': target.click(); break;
          case 'input':
            if (target.tagName === 'SELECT') {
              target.value = value;
              target.dispatchEvent(new Event('change', { bubbles: true }));
            } else if (target.type === 'checkbox' || target.type === 'radio') {
              target.checked = (value === 'on' || value === 'true' || value === true);
              target.dispatchEvent(new Event('change', { bubbles: true }));
            } else {
              target.value = value;
              target.dispatchEvent(new Event('input', { bubbles: true }));
            }
            break;
          case 'change':
            if (target.tagName === 'SELECT') {
              target.value = value;
              target.dispatchEvent(new Event('change', { bubbles: true }));
            } else if (target.type === 'checkbox' || target.type === 'radio') {
              target.checked = (value === 'on' || value === 'true' || value === true);
              target.dispatchEvent(new Event('change', { bubbles: true }));
            }
            break;
          case 'focus': target.focus(); break;
          case 'blur': target.blur(); break;
          case 'scroll':
            if (target === window) {
              window.scrollTo(extra.scrollX || 0, extra.scrollY || 0);
            } else if (target && target.nodeType === 1) {
              target.scrollLeft = extra.scrollLeft || 0;
              target.scrollTop = extra.scrollTop || 0;
            }
            break;
          case 'submit':
            if (target && target.tagName === 'FORM') target.submit();
            break;
          case 'keydown':
          case 'keyup':
            const ev = new KeyboardEvent(action, {
              key: value,
              bubbles: true,
              cancelable: true,
              ...extra
            });
            (target || document).dispatchEvent(ev);
            break;
          case 'contextmenu':
            (target || document).dispatchEvent(new MouseEvent('contextmenu', {
              clientX: extra.x || 0,
              clientY: extra.y || 0,
              bubbles: true,
              cancelable: true
            }));
            break;
          case 'mouseover':
            target.dispatchEvent(new MouseEvent('mouseover', { bubbles: true }));
            break;
          case 'mouseout':
            target.dispatchEvent(new MouseEvent('mouseout', { bubbles: true }));
            break;
          case 'dragstart':
            target.dispatchEvent(new DragEvent('dragstart', { bubbles: true }));
            break;
          case 'drop':
            target.dispatchEvent(new DragEvent('drop', { bubbles: true }));
            break;
          default:
            console.warn('[Recordcode] ⚠️ Action non prise en charge :', action);
        }
        log('✅ Action exécutée');
      } catch (err) {
        console.error('[Recordcode] ❌ Erreur lors de l\'exécution :', err);
      }
    }
  });

  // ========== ENVOI DU SIGNAL "BRIDGE READY" ==========

  function sendReady() {
    sendToParent({ type: 'TEST', msg: 'Bridge ready' });
    log('✅ Bridge prêt, TEST envoyé');
  }

  if (document.readyState === 'complete') {
    sendReady();
  } else {
    window.addEventListener('load', sendReady);
  }

  log('🚀 Bridge chargé (v2)');
})();</script>
